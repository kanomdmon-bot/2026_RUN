<script>

// ===== DATA =====
let products = {
"แก้ว":{price:69,stock:100,min:50},
"PCM1000":{price:1290,stock:2,min:0},
"PEA1000":{price:1290,stock:2,min:0},
"PCF1000":{price:1290,stock:2,min:0},
"WEC1000":{price:1690,stock:4,min:2},
"WEI1000":{price:1690,stock:4,min:2},
"WER1000":{price:1690,stock:4,min:2},
"PCF500":{price:990,stock:100,min:50},
"WEC300":{price:990,stock:20,min:10},
"Test HP35g.":{price:99,stock:200,min:100},
"HP35g แบบกล่อง.":{price:99,stock:120,min:60},
"HP500":{price:990,stock:30,min:10}
};

let cart=[];
let sales=[];

// ===== LOAD PRODUCT =====
function loadProducts(){
product.innerHTML="";
for(let p in products){
let op=document.createElement("option");
op.value=p;
op.text=p;
product.appendChild(op);
}
}

// ===== LOAD SALES FROM STORAGE =====
function loadSalesFromStorage(){
let saved = localStorage.getItem("salesData");
if(saved){
sales = JSON.parse(saved);
}
renderSales();
}

// ===== CLOCK =====
setInterval(()=>{
time.innerText=new Date().toLocaleString();
},1000);

// ===== ADD TO CART =====
function addToCart(){
let p=product.value;
let q=parseInt(qty.value);
let priceInput=price.value?parseInt(price.value):products[p].price;

if(!q || q<=0){
alert("จำนวนไม่ถูกต้อง");
return;
}

// รวมสินค้าเดิม
let found = cart.find(c=>c.p===p);

if(found){
found.q += q;
}else{
cart.push({p,q,price:priceInput});
}

renderCart();

// clear input
qty.value="";
price.value="";
}

// ===== CART =====
function renderCart(){
let cartDiv=document.getElementById("cart");
cartDiv.innerHTML="";

cart.forEach((c,i)=>{
cartDiv.innerHTML+=`
<div>
${c.p} x ${c.q}
<button onclick="removeCart(${i})">ลบ</button>
</div>`;
});
}

function removeCart(i){
cart.splice(i,1);
renderCart();
}

// ===== SEND TO SHEET =====
async function sendToSheet(data){
try{
let res = await fetch("YOUR_API_URL",{
method:"POST",
body: JSON.stringify(data)
});
return await res.json();
}catch(e){
return {status:"error"};
}
}

// ===== CHECKOUT =====
async function checkout(){

if(cart.length===0) return alert("ไม่มีสินค้า");

let user=username.value || "ไม่ระบุ";
let ev=event.value;

let total=0;
let itemsText="";
let totalQty=0;

cart.forEach(c=>{
total+=c.price*c.q;
itemsText += c.p + " x " + c.q + "\n";
totalQty += c.q;
});

// confirm
if(!confirm(`ยอดรวม ${total} บาท ยืนยัน?`)) return;

// ส่งข้อมูล
let result = await sendToSheet({
user:user,
event:ev,
items:itemsText,
qty: totalQty,
total: total,
cart: cart
});

if(result.status==="success"){

// ✅ เก็บ sales
sales.push({
user:user,
items:[...cart],
total:total
});

// save
localStorage.setItem("salesData", JSON.stringify(sales));

// update UI
renderSales();

// clear cart
cart=[];
renderCart();

status.innerText="✅ บันทึกสำเร็จ";

}else{
status.innerText="❌ บันทึกไม่สำเร็จ";
}
}

// ===== SALES TABLE =====
function renderSales(){
salesTable.innerHTML="";
let total=0;

sales.forEach((s,i)=>{
total+=s.total;

salesTable.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${s.user}</td>
<td>${s.items.map(x=>x.p+"("+x.q+")").join(",")}</td>
<td>${s.total}</td>
<td><button onclick="deleteSale(${i})" class="danger">ลบ</button></td>
</tr>`;
});

totalSales.innerText=total;
totalOrders.innerText=sales.length;
}

// ===== DELETE =====
function deleteSale(i){
sales.splice(i,1);
localStorage.setItem("salesData", JSON.stringify(sales));
renderSales();
}

// ===== INVENTORY =====
function showInventory(){
let html="<table class='table'><tr><th>สินค้า</th><th>คงเหลือ</th><th>สถานะ</th></tr>";

for(let p in products){
let s=products[p].stock;
let min=products[p].min;

let statusText=s<=0?"หมด":s<=min?"ใกล้หมด":"ปกติ";
let cls=s<=0?"status-red":s<=min?"status-yellow":"status-green";

html+=`<tr>
<td>${p}</td>
<td>${s}</td>
<td class="${cls}">${statusText}</td>
</tr>`;
}

html+="</table>";
inventory.innerHTML=html;
}

// ===== INIT =====
loadProducts();
loadSalesFromStorage();

</script>
