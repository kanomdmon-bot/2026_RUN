<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: sans-serif; background:#111; color:#fff; padding:15px }
h2 { text-align:center }
.card { background:#1e1e2f; padding:15px; margin:10px 0; border-radius:10px }
button { padding:10px; margin-top:5px; cursor:pointer; width:100% }
.total { font-size:20px; margin-top:10px; color:#00e676 }
</style>
</head>

<body>

<h2>🛒 POS หน้าร้าน</h2>

<h3>สินค้า</h3>
<div id="products">กำลังโหลด...</div>

<h3>🛒 ตะกร้า</h3>
<div id="cart">ตะกร้าว่าง</div>
<div id="total" class="total">รวม: 0 บาท</div>
<button id="checkoutBtn" onclick="checkout()">💳 ชำระเงิน</button>

<h3>📊 ยอดขาย</h3>
<canvas id="chart"></canvas>

<script>
let products = [];
let cart = [];
let chartInstance = null;

// โหลดสินค้า
function loadProducts(){
  google.script.run.withSuccessHandler(data=>{
    products = data || [];
    renderProducts();
  }).getProducts();
}

// แสดงสินค้า
function renderProducts(){
  let html = "";

  products.forEach(p=>{
    html += `
    <div class="card">
      <b>${p.name}</b><br>
      ราคา: ${p.price} บาท<br>
      คงเหลือ: ${p.stock}<br>
      <button onclick="add('${p.id}')">➕ เพิ่ม</button>
    </div>`;
  });

  document.getElementById("products").innerHTML = html || "ไม่มีสินค้า";
}

// เพิ่มสินค้า
function add(id){
  let p = products.find(x => String(x.id) === String(id));

  if(!p) return alert("ไม่พบสินค้า");
  if(p.stock <= 0) return alert("ของหมด");

  let item = cart.find(x => String(x.id) === String(id));

  if(item){
    if(item.qty < p.stock){
      item.qty++;
    } else {
      return alert("สต็อกไม่พอ");
    }
  } else {
    cart.push({...p, qty:1});
  }

  renderCart();
}

// ลบสินค้า
function removeItem(id){
  cart = cart.filter(x => String(x.id) !== String(id));
  renderCart();
}

// render cart
function renderCart(){
  let html="";
  let total=0;

  cart.forEach(c=>{
    let sum = c.qty * c.price;
    total += sum;

    html += `
    ${c.name} x ${c.qty} = ${sum} บาท
    <button onclick="removeItem('${c.id}')">❌ ลบ</button><br>`;
  });

  document.getElementById("cart").innerHTML = html || "ตะกร้าว่าง";
  document.getElementById("total").innerText = "รวม: " + total + " บาท";
}

// checkout
function checkout(){
  if(cart.length === 0) return alert("ตะกร้าว่าง");

  const btn = document.getElementById("checkoutBtn");
  btn.disabled = true;
  btn.innerText = "กำลังบันทึก...";

  google.script.run
    .withSuccessHandler(res=>{
      alert("ขายสำเร็จ 🎉\nเลขออเดอร์: " + res.orderId + "\nยอด: " + res.total + " บาท");

      cart=[];
      renderCart();
      loadProducts();
      loadDashboard();

      btn.disabled = false;
      btn.innerText = "💳 ชำระเงิน";
    })
    .withFailureHandler(err=>{
      alert(err.message);
      btn.disabled = false;
      btn.innerText = "💳 ชำระเงิน";
    })
    .checkout(cart);
}

// dashboard
function loadDashboard(){
  google.script.run.withSuccessHandler(data=>{
    if(!data) return;

    if(chartInstance) chartInstance.destroy();

    chartInstance = new Chart(document.getElementById("chart"), {
      type:'line',
      data:{
        labels:data.map(d=>d.date),
        datasets:[{
          label:'ยอดขาย',
          data:data.map(d=>d.total),
          tension:0.3
        }]
      }
    });
  }).getDashboard();
}

window.onload = ()=>{
  loadProducts();
  loadDashboard();
};
</script>

</body>
</html>
