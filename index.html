<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: sans-serif; background:#111; color:#fff; padding:20px }
.card { background:#1e1e2f; padding:15px; margin:10px 0; border-radius:10px }
button { padding:8px 12px; margin-top:5px }
</style>
</head>

<body>

<h2>🛒 POS ระบบขายหน้าร้าน</h2>

<!-- LOGIN -->
<div id="loginBox">
  <input id="user" placeholder="username"><br><br>
  <input id="pass" type="password" placeholder="password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- POS -->
<div id="app" style="display:none">
  <h3>สินค้า</h3>
  <div id="products"></div>

  <h3>🛒 ตะกร้า</h3>
  <div id="cart"></div>
  <button onclick="checkout()">ชำระเงิน</button>

  <h3>📊 Dashboard</h3>
  <canvas id="chart"></canvas>
</div>

<script>
let products = [];
let cart = [];
let staff = "";

// LOGIN
function login(){
  google.script.run.withSuccessHandler(res=>{
    if(res.status){
      staff = res.user;
      document.getElementById("loginBox").style.display="none";
      document.getElementById("app").style.display="block";
      loadProducts();
      loadDashboard();
    } else {
      alert("Login ไม่สำเร็จ");
    }
  }).login(user.value, pass.value);
}

// โหลดสินค้า
function loadProducts(){
  google.script.run.withSuccessHandler(data=>{
    products = data;
    renderProducts();
  }).getProducts();
}

// แสดงสินค้า
function renderProducts(){
  let html = "";
  products.forEach(p=>{
    html += `
    <div class="card">
      <b>${p.name}</b><br>
      ราคา: ${p.price} บาท<br>
      คงเหลือ: ${p.stock}<br>
      <button onclick="add('${p.id}')">เพิ่ม</button>
    </div>`;
  });
  document.getElementById("products").innerHTML = html;
}

// เพิ่มตะกร้า
function add(id){
  let p = products.find(x=>x.id==id);
  let item = cart.find(x=>x.id==id);

  if(item) item.qty++;
  else cart.push({...p, qty:1});

  renderCart();
}

// แสดงตะกร้า
function renderCart(){
  let html="";
  cart.forEach(c=>{
    html += `${c.name} x ${c.qty}<br>`;
  });
  document.getElementById("cart").innerHTML = html;
}

// CHECKOUT
function checkout(){
  google.script.run.withSuccessHandler(()=>{
    alert("ขายสำเร็จ");
    cart=[];
    renderCart();
    loadProducts();
    loadDashboard();
  }).checkout(cart, staff);
}

// Dashboard
function loadDashboard(){
  google.script.run.withSuccessHandler(data=>{
    new Chart(document.getElementById("chart"), {
      type: 'line',
      data: {
        labels: data.map(d=>d.date),
        datasets: [{ label:'ยอดขาย', data:data.map(d=>d.total) }]
      }
    });
  }).getDashboard();
}
</script>

</body>
</html>
