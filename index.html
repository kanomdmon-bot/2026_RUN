<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Real-time Sales & Inventory</title>
<style>
body {
  font-family: sans-serif;
  background: #f5f7fa;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

.card {
  background: #fff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

h2 {
  margin-top: 0;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.primary { background: #28a745; color: white; }
.danger { background: #dc3545; color: white; }
.warning { background: #ffc107; }

input, select {
  padding: 6px;
  margin: 5px;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th, .table td {
  border: 1px solid #ddd;
  padding: 8px;
}

.status-green { color: green; }
.status-yellow { color: orange; }
.status-red { color: red; }

</style>
</head>
<body>

<div class="container">

<!-- HEADER -->
<div class="card">
  <h2>บันทึกยอดขาย & ตัดสต็อก</h2>

  <label>เลือกอีเวนต์:</label>
  <select id="event">
    <option>สิงห์เหนือ เสือใต้ Run for Give Mini Marathon</option>
    <option>Prachin NIGHT RUN</option>
    <option>Defence Run 2026</option>
    <option>DPT MINI MARATHON</option>
  </select>

  <div>เวลา: <span id="time"></span></div>

  <button class="primary">ดูสรุปยอดวันนี้</button>
  <button class="warning">ดูสต็อก</button>
</div>

<!-- INPUT -->
<div class="card">
  <h3>เพิ่มรายการขาย</h3>

  <select id="product"></select>
  <input type="number" id="qty" placeholder="จำนวน">
  <input type="number" id="discount" placeholder="ส่วนลด">

  <button class="primary" onclick="addSale()">เพิ่มรายการขาย</button>
</div>

<!-- TABLE -->
<div class="card">
  <h3>รายการขายวันนี้</h3>
  <table class="table">
    <thead>
      <tr>
        <th>#</th>
        <th>สินค้า</th>
        <th>จำนวน</th>
        <th>ราคา</th>
        <th>ส่วนลด</th>
        <th>รวม</th>
        <th>สต็อก</th>
        <th>จัดการ</th>
      </tr>
    </thead>
    <tbody id="salesTable"></tbody>
  </table>
</div>

<!-- SUMMARY -->
<div class="card">
  <h3>สรุป</h3>
  <div>ยอดขายรวม: <span id="totalSales">0</span></div>
</div>

</div>

<script>

// สินค้า + ราคา + สต็อก
let products = {
  "PCM1000": {price: 1200, stock: 20},
  "PCF1000": {price: 1200, stock: 20},
  "WEC1000": {price: 1500, stock: 15},
  "WEI1000": {price: 1500, stock: 15},
  "HP500": {price: 500, stock: 30},
  "Black Shaker": {price: 150, stock: 50}
};

let sales = [];

// โหลด dropdown
let productSelect = document.getElementById("product");
for (let key in products) {
  let option = document.createElement("option");
  option.value = key;
  option.text = key;
  productSelect.appendChild(option);
}

// เวลา realtime
setInterval(() => {
  document.getElementById("time").innerText =
    new Date().toLocaleString();
}, 1000);

// เพิ่มรายการขาย
function addSale() {
  let product = document.getElementById("product").value;
  let qty = parseInt(document.getElementById("qty").value);
  let discount = parseInt(document.getElementById("discount").value) || 0;

  if (!qty || qty <= 0) return alert("กรอกจำนวน");

  if (products[product].stock < qty) {
    alert("สต็อกไม่พอ");
    return;
  }

  let price = products[product].price;
  let total = (price * qty) - discount;

  // ตัดสต็อก
  products[product].stock -= qty;

  sales.push({product, qty, price, discount, total});

  renderTable();
}

// แสดงตาราง
function renderTable() {
  let table = document.getElementById("salesTable");
  table.innerHTML = "";

  let totalSales = 0;

  sales.forEach((item, index) => {
    totalSales += item.total;

    let stock = products[item.product].stock;
    let statusClass =
      stock > 10 ? "status-green" :
      stock > 5 ? "status-yellow" : "status-red";

    table.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${item.product}</td>
        <td>${item.qty}</td>
        <td>${item.price}</td>
        <td>${item.discount}</td>
        <td>${item.total}</td>
        <td class="${statusClass}">${stock}</td>
        <td>
          <button class="danger" onclick="deleteItem(${index})">ลบ</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("totalSales").innerText = totalSales;
}

// ลบ = คืนสต็อก
function deleteItem(index) {
  let item = sales[index];

  products[item.product].stock += item.qty;

  sales.splice(index, 1);

  renderTable();
}

</script>

</body>
</html>
