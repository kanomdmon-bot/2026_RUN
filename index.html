<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Real-time Sales & Inventory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* CSS เดิม ... */
</style>
</head>
<body>
<div class="card">
  <h2>บันทึกยอดขาย & ตัดสต็อก</h2>
  <label>ชื่อผู้ขาย: <input id="username" placeholder="ชื่อผู้ขาย"></label><br>
  <label>อีเวนต์:
    <select id="eventSelect">
      <option>สิงห์เหนือ เสือใต้ Run for Give Mini Marathon</option>
      <option>Prachin NIGHT RUN</option>
      <option>Defence Run 2026</option>
      <option>DPT MINI MARATHON</option>
    </select>
  </label><br>
  <label>สินค้า:
    <select id="product"></select>
  </label>
  <input id="qty" type="number" placeholder="จำนวน">
  <input id="price" type="number" placeholder="ราคา (ถ้ามี)">
  <button onclick="addToCart()">เพิ่มลงตะกร้า</button>
</div>

<div class="card">
  <h3>ตะกร้าสินค้า</h3>
  <div id="cart"></div>
  <button onclick="checkout()">บันทึกยอดขาย</button>
  <div id="status"></div>
</div>

<div class="card">
  <h3>ยอดขายทั้งหมด</h3>
  <table id="salesTable">
    <thead><tr><th>ลำดับ</th><th>ผู้ขาย</th><th>สินค้า</th><th>รวม</th><th>ลบ</th></tr></thead>
    <tbody></tbody>
  </table>
  <p>รวมทั้งหมด: <span id="totalSales">0</span> บาท</p>
  <p>จำนวนคำสั่ง: <span id="totalOrders">0</span></p>
</div>

<div class="card">
  <h3>สต็อกสินค้า</h3>
  <button onclick="showInventory()">ดูสต็อก</button>
  <div id="inventory"></div>
</div>

<p>เวลา: <span id="time"></span></p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxRn6TNti42_rUuRPh32e-3PiWFAU321M-Do8hkJBB5APM4H3PWBERll2cXri9YNImLow/exec; // ใส่ URL จาก GAS ที่ deploy

// ใช้โค้ด JS จากที่คุณส่งล่าสุด (ที่ผมตรวจแล้วว่า POST ถูกต้อง)
</script>
</body>
</html>
