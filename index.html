<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Real-time Sales & Inventory</title>
<style>
body { font-family: sans-serif; padding: 20px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
th { background: #eee; }
input[type=number], input[type=text], select { padding: 4px; margin: 2px; }
button { padding: 4px 10px; margin: 2px; }
.status-red { color:red; font-weight:bold; }
.status-yellow { color:orange; font-weight:bold; }
.status-green { color:green; font-weight:bold; }
</style>
</head>
<body>

<h2>บันทึกยอดขาย & ตัดสต็อก</h2>

<label>ชื่อผู้ขาย: <input id="username" type="text" placeholder="ชื่อผู้ขาย"></label><br>
<label>อีเวนต์: <input id="event" type="text" placeholder="อีเวนต์"></label><br>
<label>สินค้า:
  <select id="product"></select>
</label>
<input id="qty" type="number" placeholder="จำนวน">
<input id="price" type="number" placeholder="ราคา (ถ้ามี)">
<button onclick="addToCart()">เพิ่มลงตะกร้า</button>

<h3>ตะกร้าสินค้า</h3>
<div id="cart"></div>
<button onclick="checkout()">บันทึกยอดขาย</button>

<div id="status"></div>

<h3>ยอดขายทั้งหมด</h3>
<table id="salesTable">
<thead>
<tr><th>ลำดับ</th><th>ผู้ขาย</th><th>สินค้า</th><th>รวม</th><th>ลบ</th></tr>
</thead>
<tbody></tbody>
</table>
<p>รวมทั้งหมด: <span id="totalSales">0</span> บาท</p>
<p>จำนวนคำสั่ง: <span id="totalOrders">0</span></p>

<h3>สต็อกสินค้า</h3>
<div id="inventory"></div>

<p>เวลา: <span id="time"></span></p>

<script>
document.addEventListener("DOMContentLoaded", ()=> {

const API_URL = "https://script.google.com/macros/s/AKfycbwkHj712UTdvlIyxTB6_RXqGJzISM4tt4t_HSqrTwtZ-sgzA0Kl0Dahi400jQd13TsAA/exec";

const product = document.getElementById("product");
const qty = document.getElementById("qty");
const price = document.getElementById("price");
const username = document.getElementById("username");
const eventInput = document.getElementById("event");
const status = document.getElementById("status");
const inventory = document.getElementById("inventory");
const cartDiv = document.getElementById("cart");

let products = {};
let cart = [];
let sales = [];
let isProcessing = false;

// ===== CLOCK =====
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleString();
},1000);

// ===== ADD TO CART =====
function addToCart(){
  let p = product.value;
  let q = parseInt(qty.value);
  let priceInput = price.value ? parseInt(price.value) : (products[p]?.price || 0);

  if(!q || q <= 0){
    alert("จำนวนไม่ถูกต้อง");
    return;
  }

  if(!products[p]){
    alert("ไม่พบสินค้า");
    return;
  }

  let found = cart.find(c=>c.p===p);
  if(found){
    found.q += q;
  }else{
    cart.push({p,q,price:priceInput});
  }

  renderCart();
  qty.value="";
  price.value="";
}

// ===== CART =====
function renderCart(){
  cartDiv.innerHTML = "";
  cart.forEach((c,i)=>{
    cartDiv.innerHTML += `<div>${c.p} x ${c.q} <button onclick="removeCart(${i})">ลบ</button></div>`;
  });
}

function removeCart(i){
  cart.splice(i,1);
  renderCart();
}

// ===== SEND TO SHEET =====
async function sendToSheet(data){
  try{
    let controller = new AbortController();
    setTimeout(()=>controller.abort(),10000);
    let res = await fetch(API_URL,{
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(data),
      signal: controller.signal
    });
    return await res.json();
  }catch(e){
    return {status:"error", message:"network error"};
  }
}

// ===== CHECKOUT =====
async function checkout(){
  if(isProcessing) return;
  isProcessing = true;

  if(cart.length===0){
    alert("ไม่มีสินค้า");
    isProcessing = false;
    return;
  }

  for(let c of cart){
    if(!products[c.p] || products[c.p].stock < c.q){
      alert("สต็อกไม่พอ: " + c.p);
      isProcessing = false;
      return;
    }
  }

  let user = username.value || "ไม่ระบุ";
  let ev = eventInput.value;

  let total = 0;
  let itemsText = "";
  let totalQty = 0;

  cart.forEach(c=>{
    total += c.price * c.q;
    itemsText += c.p + " x " + c.q + "\n";
    totalQty += c.q;
  });

  if(!confirm(`🧾 สรุป\n\n${itemsText}\nรวม ${totalQty} ชิ้น\n💰 ${total} บาท\n\nยืนยัน?`)){
    isProcessing = false;
    return;
  }

  status.innerText = "⏳ กำลังบันทึก...";
  let result = await sendToSheet({
    user:user,
    event:ev,
    items:itemsText,
    qty:totalQty,
    total:total,
    cart:cart
  });

  if(result.status==="success"){
    await loadStock();
    await loadSales();
    cart=[];
    renderCart();
    qty.value="";
    price.value="";
    status.innerText="✅ บันทึกสำเร็จ";
  }else{
    status.innerText="❌ "+(result.message || "บันทึกไม่สำเร็จ");
  }
  isProcessing = false;
}

// ===== SALES TABLE =====
function renderSales(){
  let salesTable = document.getElementById("salesTable").getElementsByTagName("tbody")[0];
  salesTable.innerHTML = "";
  let total = 0;

  sales.forEach((s,i)=>{
    total += Number(s.total)||0;
    let itemsText = Array.isArray(s.items) ? s.items.map(x=>x.p+"("+x.q+")").join(",") : s.items;
    salesTable.innerHTML += `<tr>
      <td>${i+1}</td>
      <td>${s.user}</td>
      <td>${itemsText}</td>
      <td>${s.total}</td>
      <td><button onclick="deleteSale(${i})">ลบ</button></td>
    </tr>`;
  });

  document.getElementById("totalSales").innerText = total;
  document.getElementById("totalOrders").innerText = sales.length;
}

// ===== LOAD STOCK =====
async function loadStock() {
  try {
    let res = await fetch("https://script.google.com/macros/s/AKfycbwNDVdAYp65mNUaGyeboARWBjHA8821_PHCFAK6LZkQm_686LDsvpxjG5kBiFF-JQexvw/exec?action=getStock");
    let data = await res.json();
    console.log("Stock:", data);
    return data;
  } catch(e) {
    console.error("โหลด stock ไม่สำเร็จ:", e);
  }
}

    showInventory();

  }catch(e){
    alert("โหลด stock ไม่สำเร็จ: "+e.message);
  }
}

// ===== LOAD SALES =====
async function loadSales(){
  try{
    let res = await fetch(API_URL+"?action=getSales");
    let data = await res.json();
    if(data.status==="error") throw new Error(data.message);
    sales = data;
    renderSales();
  }catch(e){
    alert("โหลด sales ไม่สำเร็จ: "+e.message);
  }
}

// ===== DELETE SALE =====
function deleteSale(i){
  sales.splice(i,1);
  renderSales();
}

// ===== INVENTORY =====
function showInventory(){
  let html="<table><tr><th>สินค้า</th><th>คงเหลือ</th><th>สถานะ</th></tr>";
  for(let p in products){
    let s=products[p].stock;
    let min=products[p].min;
    let statusText=s<=0?"หมด":s<=min?"ใกล้หมด":"ปกติ";
    let cls=s<=0?"status-red":s<=min?"status-yellow":"status-green";
    html+=`<tr><td>${p}</td><td>${s}</td><td class="${cls}">${statusText}</td></tr>`;
  }
  html+="</table>";
  inventory.innerHTML=html;
}

// ===== INIT =====
loadStock();
loadSales();

});
</script>
</body>
</html>
