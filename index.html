<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz0A-3dSwIprPd06gWxOr0qHJ6ng3JJLXTxOYajrhH9Q2g89RhMxjAFDp1EhSjbEdJGZQ/exec";

let products = {};
let cart=[];
let sales=[];
let isProcessing = false; // 🔥 กันกดซ้ำ

// ===== CLOCK =====
setInterval(()=>{
time.innerText=new Date().toLocaleString();
},1000);

// ===== ADD TO CART =====
function addToCart(){
let p=product.value;
let q=parseInt(qty.value);
let priceInput=price.value?parseInt(price.value):products[p].price;

if(!q || q<=0){
alert("จำนวนไม่ถูกต้อง");
return;
}

// 🔥 รวมสินค้าเดิม
let found = cart.find(c=>c.p===p);
if(found){
found.q += q;
}else{
cart.push({p,q,price:priceInput});
}

renderCart();

// reset input
qty.value="";
price.value="";
}

// ===== CART =====
function renderCart(){
let cartDiv=document.getElementById("cart");
cartDiv.innerHTML="";

cart.forEach((c,i)=>{
cartDiv.innerHTML+=`
<div>
${c.p} x ${c.q}
<button onclick="removeCart(${i})">ลบ</button>
</div>`;
});
}

function removeCart(i){
cart.splice(i,1);
renderCart();
}

// ===== SEND TO SHEET =====
async function sendToSheet(data){
try{
let res = await fetch(API_URL,{
method:"POST",
body: JSON.stringify(data)
});
return await res.json();
}catch(e){
return {status:"error"};
}
}

// ===== CHECKOUT =====
async function checkout(){

if(isProcessing) return; // 🔥 กันกดซ้ำ
isProcessing = true;

if(cart.length===0){
alert("ไม่มีสินค้า");
isProcessing = false;
return;
}

// 🔥 กัน stock ติดลบ
for(let c of cart){
if(products[c.p].stock < c.q){
alert("สต็อกไม่พอ: " + c.p);
isProcessing = false;
return;
}
}

let user=username.value || "ไม่ระบุ";
let ev=event.value;

let total=0;
let itemsText="";
let totalQty=0;

cart.forEach(c=>{
total+=c.price*c.q;
itemsText += c.p + " x " + c.q + "\n";
totalQty += c.q;
});

// 🔥 confirm แบบอ่านง่าย
if(!confirm(`🧾 สรุปยอด\n\n${itemsText}\nรวม ${totalQty} ชิ้น\n💰 ${total} บาท\n\nยืนยัน?`)){
isProcessing = false;
return;
}

// 🔥 ส่งข้อมูล
let result = await sendToSheet({
user:user,
event:ev,
items:itemsText,
qty: totalQty,
total: total,
cart: cart
});

if(result.status==="success"){

await loadStock();
await loadSales();

cart=[];
renderCart();

qty.value="";
price.value="";

status.innerText="✅ บันทึกสำเร็จ";

}else{
status.innerText="❌ บันทึกไม่สำเร็จ";
}

isProcessing = false; // 🔥 ปลดล็อค
}

// ===== SALES TABLE =====
function renderSales(){
salesTable.innerHTML="";
let total=0;

sales.forEach((s,i)=>{
total+=s.total;

salesTable.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${s.user}</td>
<td>${s.items.map(x=>x.p+"("+x.q+")").join(",")}</td>
<td>${s.total}</td>
<td><button onclick="deleteSale(${i})" class="danger">ลบ</button></td>
</tr>`;
});

totalSales.innerText=total;
totalOrders.innerText=sales.length;
}

// ===== LOAD STOCK =====
async function loadStock(){
let res = await fetch(API_URL+"?action=getStock");
products = await res.json();

product.innerHTML="";
for(let p in products){
let op=document.createElement("option");
op.value=p;
op.text=p;
product.appendChild(op);
}
}

// ===== LOAD SALES =====
async function loadSales(){
let res = await fetch(API_URL+"?action=getSales");
sales = await res.json();
renderSales();
}

// ===== DELETE (เฉพาะหน้า ไม่ลบ backend) =====
function deleteSale(i){
sales.splice(i,1);
renderSales();
}

// ===== INVENTORY =====
function showInventory(){
let html="<table class='table'><tr><th>สินค้า</th><th>คงเหลือ</th><th>สถานะ</th></tr>";

for(let p in products){
let s=products[p].stock;
let min=products[p].min;

let statusText=s<=0?"หมด":s<=min?"ใกล้หมด":"ปกติ";
let cls=s<=0?"status-red":s<=min?"status-yellow":"status-green";

html+=`<tr>
<td>${p}</td>
<td>${s}</td>
<td class="${cls}">${statusText}</td>
</tr>`;
}

html+="</table>";
inventory.innerHTML=html;
}

// ===== INIT =====
loadStock();
loadSales();

</script>
