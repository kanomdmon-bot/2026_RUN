<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POS</title>

<!-- ✅ เพิ่ม Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: sans-serif; background:#111; color:#fff; padding:20px }
.card { background:#1e1e2f; padding:15px; margin:10px 0; border-radius:10px }
button { padding:8px 12px; margin-top:5px; cursor:pointer }
button:disabled { opacity:0.5 }
.total { font-size:18px; margin-top:10px; color:#00e676 }
</style>
</head>

<body>

<h2>🛒 POS ระบบขายหน้าร้าน</h2>

<h3>สินค้า</h3>
<div id="products">กำลังโหลด...</div>

<h3>🛒 ตะกร้า</h3>
<div id="cart">ตะกร้าว่าง</div>
<div id="total" class="total">รวม: 0 บาท</div>
<button id="checkoutBtn" onclick="checkout()">ชำระเงิน</button>

<h3>📊 Dashboard</h3>
<canvas id="chart"></canvas>

<script>
let products = [];
let cart = [];
let chartInstance = null;

// โหลดสินค้า
function loadProducts(){
  document.getElementById("products").innerHTML = "กำลังโหลด...";

  google.script.run.withSuccessHandler(data=>{
    products = data || [];
    renderProducts();
  }).getProducts();
}

// แสดงสินค้า
function renderProducts(){
  let html = "";

  if(products.length === 0){
    html = "ไม่มีสินค้า";
  } else {
    products.forEach(p=>{
      html += `
      <div class="card">
        <b>${p.name}</b><br>
        ราคา: ${p.price} บาท<br>
        คงเหลือ: ${p.stock}<br>
        <button onclick="add('${p.id}')">เพิ่ม</button>
      </div>`;
    });
  }

  document.getElementById("products").innerHTML = html;
}

// เพิ่มสินค้า
function add(id){
  let p = products.find(x => String(x.id) === String(id));

  if(!p){
    alert("ไม่พบสินค้า");
    return;
  }

  if(p.stock <= 0){
    alert("ของหมด");
    return;
  }

  let item = cart.find(x => String(x.id) === String(id));

  if(item){
    if(item.qty < p.stock){
      item.qty++;
    } else {
      alert("สต็อกไม่พอ");
      return;
    }
  } else {
    cart.push({...p, qty:1});
  }

  renderCart();
}

// ลบสินค้า
function removeItem(id){
  cart = cart.filter(x => String(x.id) !== String(id));
  renderCart();
}

// แสดงตะกร้า
function renderCart(){
  let html="";
  let total=0;

  cart.forEach(c=>{
    let sum = c.qty * c.price;
    total += sum;

    html += `
    ${c.name} x ${c.qty} = ${sum} บาท
    <button onclick="removeItem('${c.id}')">ลบ</button><br>`;
  });

  document.getElementById("cart").innerHTML = html || "ตะกร้าว่าง";
  document.getElementById("total").innerText = "รวม: " + total + " บาท";
}

// CHECKOUT
function checkout(){
  if(cart.length === 0){
    alert("ตะกร้าว่าง");
    return;
  }

  const btn = document.getElementById("checkoutBtn");
  btn.disabled = true;
  btn.innerText = "กำลังบันทึก...";

  google.script.run
    .withSuccessHandler(()=>{
      alert("ขายสำเร็จ 🎉");
      cart=[];
      renderCart();
      loadProducts();
      loadDashboard();
      btn.disabled = false;
      btn.innerText = "ชำระเงิน";
    })
    .withFailureHandler(err=>{
      alert("ERROR: " + err.message);
      btn.disabled = false;
      btn.innerText = "ชำระเงิน";
    })
    .checkout(cart);
}

// Dashboard
function loadDashboard(){
  google.script.run.withSuccessHandler(data=>{

    if(!data || data.length === 0){
      return;
    }

    if(chartInstance) chartInstance.destroy();

    chartInstance = new Chart(document.getElementById("chart"), {
      type:'line',
      data:{
        labels:data.map(d=>d.date),
        datasets:[{
          label:'ยอดขาย',
          data:data.map(d=>d.total),
          tension:0.3
        }]
      }
    });
  }).getDashboard();
}

// โหลดตอนเปิด
window.onload = function(){
  loadProducts();
  loadDashboard();
}
</script>

</body>
</html>
